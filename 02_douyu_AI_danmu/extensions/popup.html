<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>斗鱼弹幕发送器</title>
  <style>
    body {
      width: 250px;
      font-family: sans-serif;
      padding: 10px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    textarea {
      width: 95%;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #f86;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #f75;
    }
    .icon-btn {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 5px;
      font-size: 1.2em;
      width: auto;
    }
    .icon-btn:hover { background-color: #eee; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="header">
    <h3 style="margin: 0;">弹幕助手</h3>
    <button id="settingsBtn" class="icon-btn" title="设置">⚙️</button>
  </div>
  <textarea id="message" rows="4" placeholder="输入弹幕内容..."></textarea>
  <div style="display: flex; gap: 5px; margin-bottom: 10px;">
    <button id="sendButton" style="width: 50%;">发送</button>
    <button id="aiGenerateButton" style="width: 50%; background-color: #4CAF50;">AI生成</button>
  </div>
  <hr>
  <div style="margin-top: 10px;">
    <label for="providerSelect">AI 接口:</label>
    <select id="providerSelect" style="width: 95%;"></select>
  </div>
  <div style="margin-top: 10px;">
    <label for="apiKey">API 密钥:</label>
    <input type="password" id="apiKey" style="width: 95%;">
  </div>
  <div style="margin-top: 10px;">
    <label for="modelSelect">AI 模型:</label>
    <select id="modelSelect" style="width: 95%;">
    </select>
  </div>
  <div style="margin-top: 10px;">
    <label for="prompt">AI 提示词:</label>
    <textarea id="prompt" rows="6" style="width: 95%;"></textarea>
  </div>
  <div id="status" style="margin-top: 10px; color: red;"></div>
  <script src="config.js"></script>
  <script src="ai_service.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
